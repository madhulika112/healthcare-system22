<!DOCTYPE html>
<html>
<head>
    <title>Body Check</title>

    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
        }

        .box {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            margin: 50px auto;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.03);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 15px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            padding: 12px 25px;
            border: 1px solid white;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            color: black;
            transform: scale(1.08);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<h1>⚖️ Body Check (BMI)</h1>

<div class="box">

<form method="POST">

<input type="number" name="height" placeholder="Enter Height (cm)" required>
<input type="number" name="weight" placeholder="Enter Weight (kg)" required>

<br>

<button type="submit">Check BMI</button>

</form>

{% if result %}
<div class="result-box" style="background: {{ color }}; border: 1px solid {{ color }}">

    <h2 style="color: {{ color }};">{{ result }}</h2>

    <p><b>Your BMI:</b> {{ bmi_value }}</p>

    <p>💡 {{ suggestion }}</p>

</div>
{% endif %}

</div>

</body>
</html>
