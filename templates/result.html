<!DOCTYPE html>
<html>
<head>
<title>Health Result</title>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    background:#1c1c1c;
    padding:30px;
    border-radius:15px;
    width:500px;
    margin:50px auto;
    animation:fadeIn 0.6s ease;
}

h1 { font-size:35px; }

.section {
    margin-top:20px;
    text-align:left;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}
</style>

</head>

<body>

<h1>🩺 Health Report</h1>

<div class="box">

<div class="section">
<h3>🧠 Possible Condition</h3>
{% for r in results %}
<p>👉 {{ r }}</p>
{% endfor %}
</div>

<div class="section">
<h3>⚠️ Risk Level</h3>
<p>{{ risk }}</p>
</div>

<div class="section">
<h3>💡 Suggestions</h3>
{% for s in suggestions %}
<p>✔ {{ s }}</p>
{% endfor %}
</div>

</div>

</body>
</html>
