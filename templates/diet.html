<!DOCTYPE html>
<html>
<head>
    <title>Diet Analyzer</title>

    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 40px;
        }

        .box {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            margin: 50px auto;
        }

        input, select {
            width: 80%;
            padding: 10px;
            margin: 15px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            padding: 12px 25px;
            border: 1px solid white;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<h1>🍎 Diet Analyzer</h1>

<div class="box">

<form method="POST" enctype="multipart/form-data">

    <!-- IMAGE UPLOAD -->
    <input type="file" name="food_image" required>

    <!-- DROPDOWN -->
    <select name="food_type" required>
        <option value="">Select Food Type</option>
        <option value="apple">Apple / Fruit</option>
        <option value="rice">Rice</option>
        <option value="milk">Milk</option>
        <option value="burger">Burger / Junk Food</option>
        <option value="chicken">Chicken / Protein</option>
    </select>

    <br>

    <button type="submit">Analyze Food</button>

</form>

</div>

</body>
</html>
