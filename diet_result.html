<!DOCTYPE html>
<html>
<head>
    <title>Diet Report</title>

    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 45px;
        }

        .box {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 15px;
            width: 420px;
            margin: 50px auto;
            text-align: left;
            transition: 0.3s;
            animation: fadeIn 0.6s ease;
        }

        .box:hover {
            transform: scale(1.03);
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        hr {
            margin: 20px 0;
            border: 1px solid #444;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
            transform: scale(1.08);
        }

        @keyframes fadeIn {
            from {opacity:0; transform:translateY(20px);}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<h1>🍽️ Diet Report</h1>

<div class="box">

    <p><b>Food:</b> {{ data.food }}</p>
    <p><b>Protein:</b> {{ data.protein }}</p>
    <p><b>Carbs:</b> {{ data.carbs }}</p>
    <p><b>Fiber:</b> {{ data.fiber }}</p>
    <p><b>Calories:</b> {{ data.calories }}</p>

    <hr>

    <p><b>💡 Suggestion:</b> {{ data.suggestion }}</p>

    <a href="/diet" class="btn">🔁 Check Again</a>

</div>

</body>
</html>
